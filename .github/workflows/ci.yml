name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libopus-dev pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked
      - run: cargo build --release --locked
      - name: Upload ASR probe binary
        uses: actions/upload-artifact@v4
        with:
          name: typeless-ibus-engine-${{ github.sha }}
          path: target/release/typeless-ibus-engine
          if-no-files-found: error
          retention-days: 1

  debian-family-compatibility:
    name: ${{ matrix.name }} / IBus protocol / .deb
    runs-on: ubuntu-24.04
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 20.04
            image: ubuntu:20.04
            key: ubuntu-20.04
          - name: Ubuntu 22.04
            image: ubuntu:22.04
            key: ubuntu-22.04
          - name: Ubuntu 24.04
            image: ubuntu:24.04
            key: ubuntu-24.04
          - name: Ubuntu 26.04
            image: ubuntu:26.04
            key: ubuntu-26.04
          - name: Debian 11
            image: debian:11
            key: debian-11
          - name: Debian 12
            image: debian:12
            key: debian-12
          - name: Debian 13
            image: debian:13
            key: debian-13
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install build and IBus test dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            dbus \
            dbus-x11 \
            git \
            ibus \
            libasound2-dev \
            libglib2.0-bin \
            libopus-dev \
            pkg-config \
            zstd
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: ${{ matrix.key }}
      - name: Build release engine
        run: cargo build --release --locked
      - name: Exercise the IBus D-Bus protocol
        run: dbus-run-session -- ./tests/ibus-protocol.sh target/release/typeless-ibus-engine
      - name: Build distribution-native Debian package
        run: |
          cargo install cargo-deb --version 3.7.0 --locked
          cargo deb --no-build
      - name: Verify Debian dependency floor
        run: |
          deb=$(find target/debian -name '*.deb' -print -quit)
          depends=$(dpkg-deb -f "$deb" Depends)
          echo "$depends"
          echo "$depends" | grep -F 'ibus (>= 1.5.22)'
      - name: Upload distribution-native Debian package
        uses: actions/upload-artifact@v4
        with:
          name: typeless-ibus-deb-${{ matrix.key }}-x86_64
          path: target/debian/*.deb
          if-no-files-found: error

  rpm-distribution-compatibility:
    name: ${{ matrix.name }} / IBus protocol / .rpm
    runs-on: ubuntu-24.04
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fedora 43
            image: fedora:43
            family: fedora
            key: fedora-43
          - name: Fedora 44
            image: fedora:44
            family: fedora
            key: fedora-44
          - name: openSUSE Tumbleweed
            image: opensuse/tumbleweed:latest
            family: opensuse
            key: opensuse-tumbleweed
    steps:
      - name: Install native RPM build and IBus test dependencies
        run: |
          case "${{ matrix.family }}" in
            fedora)
              dnf install -y --setopt=install_weak_deps=False \
                alsa-lib-devel \
                ca-certificates \
                cargo \
                cmake \
                curl \
                dbus-daemon \
                dbus-tools \
                gcc \
                gcc-c++ \
                git \
                glib2 \
                ibus \
                make \
                opus-devel \
                pkgconf-pkg-config \
                redhat-rpm-config \
                rpm-build \
                rust \
                tar \
                zstd
              ;;
            opensuse)
              zypper --non-interactive --gpg-auto-import-keys refresh
              zypper --non-interactive install --no-recommends \
                alsa-devel \
                bash \
                ca-certificates \
                cargo \
                cmake \
                curl \
                dbus-1-daemon \
                gcc \
                gcc-c++ \
                git \
                glib2-tools \
                gzip \
                ibus \
                libopus-devel \
                make \
                pkg-config \
                rpm-build \
                rust \
                tar \
                zstd
              ;;
          esac
      - uses: actions/checkout@v7
      - name: Build distribution-native binary and source RPMs
        run: ./packaging/build-rpm.sh
      - name: Install and verify RPM metadata and layout
        run: |
          rpm_file=$(find target/rpm/RPMS -type f -name 'typeless-ibus-*.rpm' -print -quit)
          test -n "$rpm_file"
          rpm -Uvh "$rpm_file"
          rpm -q typeless-ibus
          rpm -q --requires typeless-ibus | grep -Fx 'ibus >= 1.5.22'
          engine=$(rpm -ql typeless-ibus | sed -n '/\/typeless-ibus-engine$/p')
          test -n "$engine"
          test -x "$engine"
          test -f /usr/share/ibus/component/typeless.xml
          grep -F "<exec>$engine</exec>" /usr/share/ibus/component/typeless.xml
      - name: Exercise the installed RPM through the IBus D-Bus protocol
        run: |
          engine=$(rpm -ql typeless-ibus | sed -n '/\/typeless-ibus-engine$/p')
          dbus-run-session -- ./tests/ibus-protocol.sh "$engine"
      - name: Verify clean RPM removal
        run: |
          engine=$(rpm -ql typeless-ibus | sed -n '/\/typeless-ibus-engine$/p')
          rpm -e typeless-ibus
          test ! -e "$engine"
          test ! -e /usr/share/ibus/component/typeless.xml
      - name: Upload distribution-native RPMs
        uses: actions/upload-artifact@v4
        with:
          name: typeless-ibus-rpm-${{ matrix.key }}-x86_64
          path: |
            target/rpm/RPMS/**/*.rpm
            target/rpm/SRPMS/*.rpm
          if-no-files-found: error

  arch-compatibility:
    name: Arch Linux / IBus protocol
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    env:
      PATH: /github/home/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Install build and IBus test dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            alsa-lib \
            base-devel \
            ca-certificates \
            curl \
            dbus \
            git \
            glib2 \
            ibus \
            opus \
            pkgconf \
            tar \
            zstd
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: arch-linux
      - name: Build release engine
        run: cargo build --release --locked
      - name: Exercise the IBus D-Bus protocol
        run: dbus-run-session -- ./tests/ibus-protocol.sh target/release/typeless-ibus-engine

  nix:
    name: Nix / ${{ matrix.system }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: experimental-features = nix-command flakes
      - name: Check the flake
        run: nix flake check --print-build-logs --no-update-lock-file
      - name: Build the native package
        run: nix build --print-build-logs --no-update-lock-file ".#packages.${{ matrix.system }}.default"
      - name: Verify package layout
        run: |
          test -x result/libexec/typeless-ibus-engine
          test -x result/bin/typeless-ibus-engine
          engine=$(readlink -f result/libexec/typeless-ibus-engine)
          grep -F "$engine" result/share/ibus/component/typeless.xml

  asr-availability:
    name: ASR availability (non-blocking)
    needs: linux
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Download ASR probe binary
        uses: actions/download-artifact@v4
        with:
          name: typeless-ibus-engine-${{ github.sha }}
          path: target/release
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libopus-dev
          chmod +x target/release/typeless-ibus-engine
      - name: Test live ASR recognition
        id: asr_probe
        continue-on-error: true
        env:
          XDG_DATA_HOME: ${{ runner.temp }}/typeless-asr-data
          RUST_LOG: typeless_ibus_engine=info
        run: >-
          timeout 90s target/release/typeless-ibus-engine
          --check-asr-audio tests/fixtures/asr-availability.pcm
      - name: Report ASR availability
        if: always()
        env:
          PROBE_OUTCOME: ${{ steps.asr_probe.outcome }}
        run: |
          if [ "$PROBE_OUTCOME" = "success" ]; then
            echo "### ✅ Doubao ASR is available" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=ASR availability probe failed::The external ASR service rejected or failed the live audio probe. Check the x_tt_logid in the preceding step."
            echo "### ⚠️ Doubao ASR availability probe failed" >> "$GITHUB_STEP_SUMMARY"
            echo "This is non-blocking because GitHub runner networks may be rejected by the upstream service. See the preceding step for x_tt_logid and status details." >> "$GITHUB_STEP_SUMMARY"
          fi

  release-rpms:
    name: Attach native RPMs to GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: rpm-distribution-compatibility
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches the package version
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | sed -n '1p')
          test "$GITHUB_REF_NAME" = "v$version"
      - name: Download native RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: typeless-ibus-rpm-*
          path: release-rpms
          merge-multiple: true
      - name: Create the release and upload RPMs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -n "$(find release-rpms -type f -name '*.rpm' -print -quit)"
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --generate-notes \
              --title "typeless-ibus $GITHUB_REF_NAME"
          fi
          find release-rpms -type f -name '*.rpm' -print0 \
            | xargs -0 gh release upload "$GITHUB_REF_NAME" --clobber
