name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install Linux audio libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopus0 libportaudio2
      - name: Install macOS audio libraries
        if: runner.os == 'macOS'
        run: brew install opus
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
