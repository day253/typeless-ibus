name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "Cargo.toml"
      - "zensical.toml"
      - "requirements-docs.txt"
      - "packaging/build-website.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install documentation builder
        run: python -m pip install --disable-pip-version-check --requirement requirements-docs.txt
      - name: Build product website
        run: ./packaging/build-website.sh target/pages
      - uses: actions/upload-pages-artifact@v4
        with:
          path: target/pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
